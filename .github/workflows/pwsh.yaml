---
name: pwsh

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  test:
    name: Test Generated PowerShell Cmdlets
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Ruby
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: 3.2
          bundler-cache: true
      - name: Install Pester
        run: Install-Module -Name Pester -Force
      - name: Generate PowerShell Cmdlets
        run: bundle exec rake pwsh:generate_module
      - name: Run Pester
        run: Invoke-Pester -Path ./pwsh_module -CI
